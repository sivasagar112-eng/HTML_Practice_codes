<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nav bar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        header {
            position: sticky;
            top: 0px;
        }

        .logo {
            font-size: 30px;
            margin-right: 348px;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: black;
            color: white;
            margin: 0px 300px;
            height: 50px;
            border-radius: 16px;

        }

        .box ul {
            display: flex;
            gap: 30px;

        }

        .box ul li {
            list-style: none;
        }

        .box ul li a {
            color: white;
            text-decoration: none;
        }

        li :hover {
            background-color: red;
        }

        .container {
            background-color: red;
            width: 70vw;
            height: 100vh;
            border: 2px solid black;
            margin: 20px auto;
            display: flex;
            justify-content: space-around;
            align-items: center;

        }

        .box1 {
            width: 400px;
            height: 300px;
            border: 2px solid blue;
            background-color: blue;
        }

        .box2 {
            width: 400px;
            height: 300px;
            border: 2px solid black;
            background-color: black;
        }

        footer {
            width: auto;
            height: 80px;
            border: 2px solid black;
            background-color: pink;
        }
        .text{
            padding: 34px;
            border: 2px solid black;
            margin: 50px 34vw;
            font-size: 2em;
            border-radius: 55px;
            text-align: center;
            background-color: black;
        }
        .text a{
            text-decoration: none;
            color: white;
        }
        .orange-box {
            background-color: orange;
            height: 50px;
            width: 50px;
            position: fixed;
            bottom: 12px;
            right: 34px;
            border-radius: 23px;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                siva
            </div>
            <div class="box">
                <ul>
                    <li><a href="\">Home</a></li>
                    <li><a href="\">About us</a></li>
                    <li><a href="\">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="text">
            <p>
                <a href="\">Welcome to My Website </a>
            </p>
        </div>
        <div class="orange-box">

        </div>
    </main>
    <footer>

    </footer>
</body>

</html>
