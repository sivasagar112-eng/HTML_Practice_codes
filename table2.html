<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="2" width="100%" style="border-collapse: collapse;text-align: center;">
        <caption>School Block</caption>
        <tr>
            <th>Student</th>
            <th>Class</th>
            <th>School name</th>
        </tr>
        <tr>
            <td>A</td>
            <td>10th</td>
            <td rowspan="2">X-school</td>
        </tr>
        <tr>
            <td>B</td>
            <td>9th</td>
        </tr>
        <tr>
            <td>C</td>
            <td>10th</td>
            <td rowspan="2">Y-school</td>
        </tr>
        <tr>
            <td>D</td>
            <td>9th</td>
        </tr>
        <tr>
            <td>E</td>
            <td>10th</td>
            <td rowspan="2">Z-school</td>
        </tr>
        <tr>
            <td>F</td>
            <td>9th</td>
        </tr>
    </table>
</body>
</html>
