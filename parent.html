<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Parent</title>
    <style>
        * {
            margin: 10px;
        }

        .parent {
            height: 60vh;
            width: 60vw;
            border: 2px solid black;
            display: flex;
            background-color: gray;
            position: absolute;

        }

        .box1 {
            background-color: purple;
            width: 30vw;
            height: 110px;
            border: 2px solid purple;
            margin: 10px;
            border-radius: 7px;
        }

        .box2 {
            background-color: red;
            width: 260px;
            height: 200px;
            border: 2px solid purple;
            margin: 10px;
            border-radius: 7px;
            position: relative;
            left: 80px;

        }

        .box3 {
            border: 2px solid blue;
            background-color: green;
            position: fixed;
            margin: 133px;
            border-radius: 7px;
            height: 230px;
            width: 130px;
        }

        .box4 {
            width: 60vw;
            height: 30px;
            border: 2px solid black;
            position: absolute;
            bottom: 0px;
            margin: 0px;
            background-color: aquamarine;

        }
        .box1 p{
            margin: 2px;
            padding: 2px;
            
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1">
            <p>
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Hic ipsum saepe architecto, nemo laboriosam
                corrupti? Necessitatibus mollitia repellat saepe delectus tempora, totam ducimus commodi.
            </p>
        </div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
