<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            text-align: center;
        }

        .container {
            height: auto;
            width: 50vh;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin: 20px auto;
            padding: 10px;
        }

        ol,
        ul {
            margin: 0;
            padding-left: 20px;
        }

        li {
            text-align: left;
        }
    </style>
</head>

<body>
    <h1>Fruits</h1>

    <main class="container">

        <div>
            <p><strong>Name of fruits</strong></p>
            <ul>
                <li>Mango</li>
                <li>Apple</li>
                <li>Orange</li>
            </ul>
        </div>

        <hr>

        <div>
            <p><strong>Benefits of fruits</strong></p>
            <ul>
                <li>It gives vitamins</li>
                <li>It improves health</li>
                <li>It boosts immunity</li>
            </ul>
        </div>

    </main>
</body>

</html>
