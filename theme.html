    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-effect {
            background: rgba(255, 248, 240, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .fade-in-up {
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

            style="animation-delay: 0.5s;">
            <h1 class="font-display-lg text-display-lg text-primary italic mb-2 tracking-tight">
                PawMatch
            </h1>
            <p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs font-light tracking-wide">
                Find your dog's perfect match.
            </p>
        </section>
        <!-- Bottom Content: Action Area -->
        <footer class="relative z-20 w-full max-w-md px-margin-page pb-16 space-y-gutter fade-in-up"
            style="animation-delay: 0.8s;">
            <!-- Premium Glassmorphic Card for CTA -->
            <div
                class="glass-effect p-8 rounded-xl shadow-[0px_10px_30px_rgba(61,31,15,0.08)] border-[0.5px] border-secondary-fixed/50 flex flex-col space-y-6">
                <button
                    class="w-full bg-primary text-on-primary font-label-lg text-label-lg py-5 rounded-full shadow-lg hover:opacity-90 active:scale-95 transition-all duration-300 tracking-widest">
                    GET STARTED
                </button>
                <div class="flex items-center justify-between w-full">
                    <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
                    <span class="px-4 font-label-sm text-label-sm text-on-surface-variant">OR</span>
                    <div class="h-[1px] flex-grow bg-outline-variant/30"></div>
                </div>
                <button
                    class="w-full border border-primary text-primary font-label-lg text-label-lg py-5 rounded-full hover:bg-primary/5 active:scale-95 transition-all duration-300 tracking-widest">
                    SIGN IN
                </button>
            </div>
            <p class="text-center font-label-sm text-label-sm text-on-surface-variant opacity-60 pt-4">
                Exclusively for elite pedigree matches
            </p>
        </footer>
        <!-- Interactive Ambient Elements -->
        <div class="absolute inset-0 pointer-events-none z-10" id="ambient-particles"></div>
    </main>
    <script>
        // Micro-interaction: Subtle particle effect for "heart motifs"
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('ambient-particles');
            const particleCount = 12;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute material-symbols-outlined text-primary/20 pointer-events-none select-none';
                particle.innerHTML = 'favorite';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.fontSize = (Math.random() * 20 + 10) + 'px';

                // Custom animation duration and delay
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;

                particle.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
                particle.style.opacity = Math.random() * 0.3;

                container.appendChild(particle);
            }
        });

        // Button interactions
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                btn.style.transform = 'translateY(-2px)';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'translateY(0px)';
            });
        });
    </script>
