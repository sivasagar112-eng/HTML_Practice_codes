<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
        }

        .navbar {
            background-color: pink;
            height: 50px;
            border-radius: 40px;
            position: sticky;
            top: 0;


        }

        main {
            background-color: black;
            padding: 34px;
            color: white;

        }

        nav ul li {
            list-style: none;
            margin: 12px 23px 0 0;
            /* align-items: center; */
            text-align: center;

        }

        nav ul {
            display: flex;
            justify-content: right;
            gap: 20px;
            /* align-items: center; */

        }

        .container {
            height: 80vh;
            width: 70vw;
            border: 3px solid black;
            margin: 23px 0 0 234px;
            background-color: green;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .box1 {
            height: 261px;
            width: 261px;
            border: 2px solid black;
            background-color: aqua;

        }

        .box2 {
            height: 261px;
            width: 261px;
            border: 2px solid black;
            background-color: blueviolet;

        }

        .show {
            padding: 13px;
            border: 2px solid white;
            border-radius: 13px;
            margin: 50px 34vw;
            font-size: 2em;
            text-align: center;

        }

        .show a {
            text-decoration: none;
            color: brown;

        }

        footer {
            height: 64px;
            background-color: burlywood;
        }
        .orange-box{
            position: fixed;
            height: 68px;
            width: 68px;
            background-color: orange;
            bottom: 34px;
            right: 34px;
            border-radius: 60px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <nav>
            <ul>
                <li>Home</li>
                <li>About Us</li>
                <li>Privacy Poicy</li>
                <li>Conact Us</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>
        <div class="show"><a href="/">Welcome to my Website</a></div>
    </main>
    <footer>
        <div class="orange-box">

        </div>
    </footer>
</body>

</html>
