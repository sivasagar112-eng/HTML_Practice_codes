<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1 {
            background-color: blue;
            margin: 13px;
            padding: 3px;
        }

        .box2 {
            background-color: bisque;
            position: relative;
            margin: 13px;
            padding: 3px;


        }

        .box3 {
            background-color: aqua;
            margin: 13px;
            padding: 3px;


        }

        .box4 {
            background-color: rgb(174, 118, 12);
            margin: 13px;
            padding: 3px;


        }

        .box {
            height: 100px;
            width: 60vw;
            border: 2px solid black;
            margin: auto;
            padding: 3px;
        }
        .parent{
            margin: 23px;
            padding: 24px;
            border: 3px solid black;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
