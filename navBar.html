<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navBar</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        nav h3 {
            align-items: left;
        }

        nav {
            background-color: blue;
            padding: 15px;
            display: flex;
            justify-content: right;
            border-radius: 40px;
            margin: 15px 0 0 0;
        }

        nav a {
            text-decoration: None;
            color: white;
            font-size: 18px;
            padding: 0 34px;
        }
    </style>
</head>

<body>
    <nav>
        <h3>
            Code Sikho
        </h3>

        <a href="#">Home</a>
        <a href="#">About Us</a>
        <a href="#">Privacy policy</a>
        <a href="#">Contact Us</a>
    </nav>
</body>

</html>
