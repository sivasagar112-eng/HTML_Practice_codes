<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporary</title>

    <style>
        body {
            text-align: center;
            margin-top: 30px;
            background-color: blue;
        }

        .siva {
            display: inline-block;
            border: 2px solid black;
            padding: 20px;
            background-color: white;
        }

        h1 {
            color: blue;
            border: 2px solid black;
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-block;
            margin: 0;
        }

        h2 {
            text-decoration: underline;
        }

        a:link {
            color: blue;
        }

        a:visited {
            color: green;
        }

        a:active {
            color: red;
        }

        ol {
            display: inline-block;
            text-align: left;
        }

        h3 {
            margin-bottom: 10px;
            text-align: left;
        }

        .box {
            border: 2px solid black;
            padding: 10px 25px;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="siva">
        <h1>My Name is T. Siva Sagar Achary</h1>

        <h2>My All Social Media Pages</h2>

        <ol>
            <li><a href="https://www.instagram.com/">Instagram</a></li>
            <li><a href="https://www.youtube.com/">YouTube</a></li>
            <li><a href="https://www.facebook.com/">Facebook</a></li>
            <li><a href="https://x.com/">X</a></li>
        </ol>

        <h3>Notice !!!</h3>

        <ol class="box">
            <li>The color of the link is blue.</li>
            <li>If the link is already visited, the color will be green.</li>
            <li>While clicking the link, the color will be red.</li>
        </ol>
    </div>
</body>

</html>
