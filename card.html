<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Card</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        body {
            background-color: gray;
            padding: 45px;
        }

        .card {
            background-color: white;
            height: 300px;
            width: 198px;
            padding: 0px 0px 34px 0px;
            border-radius: 7px;


        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .container {
            padding: 7px 12px;
        }

        .container p {
            font-size: 9px;
            color: gray;
        }

        .capsule {

            padding: 0px 28px 0px 14px;

        }

        .capsule span {
            border: 1px solid gray;
            padding: 0px 6px;
            border-radius: 11px;
            font-size: 8px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .button {
            text-align: center;

        }

        .button button {
            margin-top: 23px;
            border-radius: 15px;
            padding: 7px 9px;
            font-size: 10px;
            margin-top: 17px;
            border: none;
            color: rgb(5, 5, 126);
            background-color: rgb(170, 286, 237);
        }
        button:hover{
            background-color: azure;
            cursor: pointer;
        }
        
    </style>

</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188"
                src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS77Kdc7NyWfZ2mGxTtNu9ewQU6p-YSn4xgRQ&s"
                alt="">
        </div>
        <div class="capsule">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="container">
            <h2>Siva</h2>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Reiciendis fugiat distinctio consequuntur quae
                odio hic doloribus, totam optio eaque delectus, quam sequi libero?
            </p>
        </div>
        <div class="button">
            <button>Read more</button>
        </div>
    </div>
</body>

</html>
