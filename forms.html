<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>
    <form action="/submit.php">

        <div>
            <label for="name">Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div>
            <label for="phone">phone</label>
            <input type="tel" placeholder="Enter your no." required>
        </div>

        <div>
            <label for="dob">Date of birth</label>
            <input type="date" required>
        </div>

        <div>
            <label for="gender">Gender</label>
            <select name="gender" id="gender" required>
                <option value="" disabled selected> Select Gender</option>
                <option value="male">Male</option>
                <option value="female">FeMale</option>
                <option value="other">Other</option>
            </select>
        </div>
        <h1>Subscription plan</h1>
        <div>
            <input type="radio" id="basic" name="subscription" value="basic">
            <label for="basic">Basic</label>

            <input type="radio" id="premium" name="subscription" value="premium">
            <label for="premium">Premium</label>

            <input type="radio" id="vip" name="subscription" value="vip">
            <label for="vip">Vip</label>
        </div>
        <div>
            <input type="checkbox" name="checkbox" id="checkbox">
            <label for="terms">I accepted the terms and condition</label>
        </div>
        <div>
            <label for="comments">Comments</label>
            <textarea name="comments" id="comments" placeholder="Enter your comments" rows="5"></textarea>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
