<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Another card by me</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: gray;
        }

        .card {
            margin: 28px;
            background-color: wheat;
            height: 300px;
            width: 198px;
            border-radius: 7px;
            padding: 0 0 56px 0;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .container {
            padding: 11px 0 0 23px;
        }

        .para {
            font-size: 10px;
            padding: 11px 12px 0 12px;
        }

        .capsules span {
            font-size: 8px;
            border: 1px solid black;
            border-radius: 19px;
            padding: 2px ;
            margin: 0 12px 0 12px;
        }
        .button{
            text-align: center;
            padding: 12px 0 0 0;
        }
        .button button{
            font-size: 9px;
            border-radius: 17px;
            padding: 2px 5px;
            background-color: rgb(164, 164, 216);
            border: none;
        }
        button:hover{
            background-color: white;
        }

    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="188px" height="170px" src="siva.jpg">
        </div>
        <div class="capsules">
            <span>Hobbies</span>
            <span>Portfolio</span>
        </div>
        <div class="container">
            <h2>Siva</h2>
        </div>
        <div class="para">
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Eaque eos quae rem est recusandae eligendi
                minus dolorem? Dicta quo laboriosam odit quis alias!
            </p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
